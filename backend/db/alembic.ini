[alembic]
script_location = backend/db
prepend_sys_path = ..
path_separator = os
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/ats_ai

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
handlers = console
level = WARN

[logger_sqlalchemy]
handlers =
level = WARN

[logger_alembic]
handlers = console
level = INFO
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
